# ============================================================
# AlfajorOS - Configuracion de Impresora
# Ender 3 Pro + Marlin - Extrusion de Crema en Frio
# ============================================================

# === Alfajor ===
alfajor:
  diametro_mm: 70.0
  margen_mm: 8.0
  centro_x: 145.0
  centro_y: 150.0
  centro_z: 11.0
  matriz_centros:
  - - 57.0
    - 65.0
    - 4.6
  - - 127.0
    - 62.0
    - 3.8
  - - 195.0
    - 63.0
    - 3.0
  - - 61.0
    - 129.0
    - 2.0
  - - 125.0
    - 129.0
    - 4.0
  - - 196.0
    - 127.0
    - 4.0
  - - 53.0
    - 203.0
    - 6.0
  - - 121.0
    - 199.0
    - 7.0
  - - 188.0
    - 201.0
    - 8.0

# === Impresion ===
impresion:
  z_altura_mm: 1.0
  velocidad_impresion: 800
  velocidad_viaje: 3000
  velocidad_z: 600
  velocidad_primera_capa: 800

# === Extrusor ===
extrusor:
  diametro_boquilla_mm: 1.5
  flujo_e_por_mm: 0.16
  retraccion_habilitada: false
  retraccion_mm: 10.0
  velocidad_retraccion: 20000
  desretraccion_mm: 54.0
  purga_inicial_mm: 120.0
  purga_pos_x: 0.0
  purga_pos_y: 0.0
  purga_pos_z: 10.5

# === Viaje ===
viaje:
  z_hop_mm: 3.0
  pos_final_x: 10.0
  pos_final_y: 10.0
  pos_final_z: 40.0
  fin_retraccion_mm: 5.0

# === Linea de crema ===
linea:
  grosor_default_mm: 2.0
  grosor_min_mm: 0.5
  grosor_max_mm: 5.0

# === Serial ===
serial:
  baudrate: 115200
  scan_patterns:
  - /dev/ttyUSB*
  - /dev/ttyACM*
  reconnect_ms: 5000
  timeout_s: 2.0

# === Imagen ===
imagen:
  epsilon_pct: 0.007
  umbral_binario: 0
  area_minima_px: 2
  margen_imagen_mm: 2.0

# === Cilindro 3D ===
cilindro:
  num_capas: 7
  z_por_capa_mm: 1.5

# === Cilindro Domo 3D ===
cilindro_domo:
  num_capas: 9
  z_por_capa_mm: 2.5
  capas_base: 3
  convexidad: 2.5
  z_aceleracion_domo: 0.5
  demo_arcos: true
  demo_arcos_num: 4
  demo_arcos_radio: 27.0
  demo_arcos_z_mm: 3.0

# === Conos Estrella 3D ===
conos_estrella:
  num_capas: 8
  z_por_capa_mm: 1.5
  num_conos: 4
  radio_cono_base: 0.35
  offset_cono: 0.55

# === Cilindro Escalonado 3D ===
cilindro_escalonado:
  num_capas: 9
  z_por_capa_mm: 1.5
  num_escalones: 3
  reduccion_por_escalon: 0.7

# === Servo (Tapa) ===
servo:
  angulo_abierto: 120
  angulo_cerrado: 128

