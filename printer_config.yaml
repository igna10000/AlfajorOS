# ============================================================
# AlfajorOS - Configuracion de Impresora
# Ender 3 Pro + Marlin - Extrusion de Crema en Frio
# ============================================================

# === Alfajor ===
alfajor:
  diametro_mm: 70.0
  margen_mm: 3.0
  centro_x: 145.0
  centro_y: 150.0

# === Impresion ===
impresion:
  z_altura_mm: 0.45
  z_offset_mm: -10.0
  velocidad_impresion: 800
  velocidad_viaje: 3000
  velocidad_z: 600
  velocidad_primera_capa: 800

# === Extrusor ===
extrusor:
  diametro_boquilla_mm: 1.5
  flujo_e_por_mm: 0.05
  retraccion_habilitada: false
  retraccion_mm: 363.0
  velocidad_retraccion: 90000
  desretraccion_mm: 54.0
  purga_inicial_mm: 120.0
  purga_pos_x: 0.0
  purga_pos_y: 0.0
  purga_pos_z: 10.5

# === Viaje ===
viaje:
  z_hop_mm: 3.0
  pos_final_x: 1.0
  pos_final_y: 1.0
  pos_final_z: 1.0

# === Linea de crema ===
linea:
  grosor_default_mm: 2.0
  grosor_min_mm: 0.5
  grosor_max_mm: 5.0

# === Serial ===
serial:
  baudrate: 115200
  scan_patterns:
  - /dev/ttyUSB*
  - /dev/ttyACM*
  reconnect_ms: 5000
  timeout_s: 2.0

